<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIGNAL — Traffic Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="masthead">
  <div class="masthead-left">
    <span class="dot"></span>
    <h1>SIGNAL</h1>
  </div>
  <div class="masthead-right">
    <span class="edition">TRAFFIC DESK</span>
    <span class="clock" id="clock">--:--:--</span>
  </div>
</div>

<!-- Signature: scrolling ticker of live headline stats -->
<div class="ticker">
  <div class="ticker-track" id="tickerTrack">
    <span>LOADING FEED…</span>
  </div>
</div>

<div class="app">

  <section class="controls">
    <div class="field">
      <label for="rangeFilter">RANGE</label>
      <select id="rangeFilter">
        <option value="all">ALL TIME</option>
        <option value="7">7 DAYS</option>
        <option value="14">14 DAYS</option>
        <option value="30" selected>30 DAYS</option>
      </select>
    </div>

    <div class="field">
      <label for="sourceFilter">SOURCE</label>
      <select id="sourceFilter">
        <option value="all">ALL</option>
        <option value="Organic">ORGANIC</option>
        <option value="Paid">PAID</option>
        <option value="Social">SOCIAL</option>
        <option value="Referral">REFERRAL</option>
        <option value="Direct">DIRECT</option>
      </select>
    </div>

    <div class="field grow">
      <label for="searchFilter">PAGE SEARCH</label>
      <input id="searchFilter" type="text" placeholder="/pricing" />
    </div>

    <button id="resetBtn" class="btn-reset">RESET</button>
  </section>

  <section class="kpis" id="kpiRow">
    <div class="kpi">
      <span class="kpi-num" id="kpiTraffic">0</span>
      <span class="kpi-label">TOTAL TRAFFIC</span>
      <span class="kpi-delta" id="kpiTrafficDelta">—</span>
    </div>
    <div class="kpi kpi-invert">
      <span class="kpi-num" id="kpiClicks">0</span>
      <span class="kpi-label">TOTAL CLICKS</span>
      <span class="kpi-delta" id="kpiClicksDelta">—</span>
    </div>
    <div class="kpi">
      <span class="kpi-num" id="kpiEngagement">0%</span>
      <span class="kpi-label">ENGAGEMENT RATE</span>
      <span class="kpi-delta" id="kpiEngagementDelta">—</span>
    </div>
    <div class="kpi">
      <span class="kpi-num" id="kpiSession">0m 0s</span>
      <span class="kpi-label">AVG. SESSION</span>
      <span class="kpi-delta" id="kpiSessionDelta">—</span>
    </div>
  </section>

  <section class="charts">
    <div class="chart-card wide">
      <div class="chart-head">
        <h2>TRAFFIC TREND</h2>
        <span class="chart-sub">DAILY VISITS / CLICKS</span>
      </div>
      <canvas id="trendChart" height="110"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-head">
        <h2>BY SOURCE</h2>
        <span class="chart-sub">SHARE OF CLICKS</span>
      </div>
      <canvas id="sourceChart" height="110"></canvas>
    </div>
  </section>

  <section class="table-card">
    <div class="table-head">
      <h2>PAGE BREAKDOWN</h2>
      <span class="row-count" id="rowCount">0 ROWS</span>
    </div>
    <div class="table-scroll">
      <table id="dataTable">
        <thead>
          <tr>
            <th data-key="date">DATE <span class="sort-arrow"></span></th>
            <th data-key="page">PAGE <span class="sort-arrow"></span></th>
            <th data-key="source">SOURCE <span class="sort-arrow"></span></th>
            <th data-key="traffic">TRAFFIC <span class="sort-arrow"></span></th>
            <th data-key="clicks">CLICKS <span class="sort-arrow"></span></th>
            <th data-key="engagement">ENG. <span class="sort-arrow"></span></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </section>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="script.js"></script>
</body>
</html>
